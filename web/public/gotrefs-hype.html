<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>GotREFS Hype Video</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100%;margin:0;}
#root{width:100%;max-width:100%;aspect-ratio:16/9;background:#0a0d1a;position:relative;overflow:hidden;font-family:'Bebas Neue',sans-serif;}
.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.05s;}
.scene.active{opacity:1;}
.scene img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,0.88) 100%);z-index:1;}
.flash{position:absolute;inset:0;background:#fff;z-index:10;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.txt{position:absolute;z-index:2;text-align:center;width:100%;bottom:14%;}
.l1{font-family:'Bebas Neue',sans-serif;color:#fff;font-size:clamp(32px,10vw,84px);text-shadow:0 0 40px rgba(220,20,20,0.9),2px 2px 0 #000;letter-spacing:0.05em;line-height:1;display:block;}
.l2{font-family:'Oswald',sans-serif;font-weight:400;color:#f0c030;font-size:clamp(13px,3vw,26px);letter-spacing:0.14em;text-transform:uppercase;text-shadow:1px 1px 0 #000;margin-top:0.2em;display:block;}
#logo-scene{background:#050810;flex-direction:column;z-index:20;gap:0;}
#logo-scene img{position:relative;width:55%;max-width:320px;height:auto;object-fit:contain;filter:drop-shadow(0 0 50px rgba(180,20,20,0.7));}
.ltag{font-family:'Oswald',sans-serif;font-weight:400;color:#f0c030;letter-spacing:0.18em;text-transform:uppercase;font-size:clamp(9px,2vw,15px);margin-top:1em;}
.lcta{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4vw,32px);color:#fff;letter-spacing:0.15em;margin-top:0.4em;background:#cc2200;padding:0.12em 0.7em;border-radius:3px;}
#pbar{position:absolute;bottom:0;left:0;height:5px;background:#cc2200;z-index:30;width:0%;}
#playbtn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,0.5);cursor:pointer;transition:opacity 0.3s;}
#playbtn.gone{opacity:0;pointer-events:none;}
#replaybtn{position:absolute;bottom:14px;right:14px;z-index:40;font-family:'Oswald',sans-serif;font-size:14px;color:#fff;background:rgba(200,30,0,0.9);border:none;padding:7px 16px;letter-spacing:0.1em;cursor:pointer;border-radius:3px;display:none;text-transform:uppercase;}
</style>

<script>
var TOTAL = 10000;
var scenes = [
  {id:'s0', start:0,    end:2200},
  {id:'s1', start:2200, end:4400},
  {id:'s2', start:4400, end:6600},
  {id:'s3', start:6600, end:8500},
  {id:'logo-scene', start:8500, end:10000}
];
var labels = [
  ['s0l1','s0l2'],['s1l1','s1l2'],['s2l1','s2l2'],['s3l1','s3l2'],[]
];

var running = false, t0 = null, raf = null, cur = -1, timers = [];

function clrTimers() { timers.forEach(clearTimeout); timers = []; }

function doFlash() {
  var f = document.getElementById('flash');
  f.style.transition = 'none';
  f.style.opacity = '0.9';
  setTimeout(function() { f.style.transition = 'opacity 0.3s'; f.style.opacity = '0'; }, 60);
}

function animText(idx) {
  var lbs = labels[idx];
  if (!lbs || !lbs.length) return;
  var l1 = document.getElementById(lbs[0]);
  var l2 = lbs[1] ? document.getElementById(lbs[1]) : null;
  if (l1) {
    l1.style.cssText += ';opacity:0;transform:scaleY(0.65) translateY(28px);transition:none;display:block;';
    timers.push(setTimeout(function() {
      l1.style.transition = 'opacity 0.3s ease, transform 0.35s cubic-bezier(0.22,1,0.36,1)';
      l1.style.opacity = '1';
      l1.style.transform = 'scaleY(1) translateY(0)';
    }, 80));
  }
  if (l2) {
    l2.style.cssText += ';opacity:0;transform:translateY(14px);transition:none;display:block;';
    timers.push(setTimeout(function() {
      l2.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      l2.style.opacity = '1';
      l2.style.transform = 'translateY(0)';
    }, 280));
  }
}

function showLogo() {
  doFlash();
  var img = document.querySelector('#logo-scene img');
  var tag = document.querySelector('.ltag');
  var cta = document.querySelector('.lcta');
  img.style.cssText += ';opacity:0;transform:scale(0.5);transition:none;';
  tag.style.cssText += ';opacity:0;transition:none;';
  cta.style.cssText += ';opacity:0;transition:none;';
  setTimeout(function() {
    img.style.transition = 'transform 0.65s cubic-bezier(0.22,1,0.36,1), opacity 0.4s';
    img.style.transform = 'scale(1)'; img.style.opacity = '1';
  }, 80);
  setTimeout(function() { tag.style.transition = 'opacity 0.4s'; tag.style.opacity = '1'; }, 500);
  setTimeout(function() { cta.style.transition = 'opacity 0.4s'; cta.style.opacity = '1'; }, 800);
}

function tick(ts) {
  if (!t0) t0 = ts;
  var el = ts - t0;
  document.getElementById('pbar').style.width = Math.min(el / TOTAL * 100, 100) + '%';
  var ai = 0;
  for (var i = scenes.length - 1; i >= 0; i--) {
    if (el >= scenes[i].start) { ai = i; break; }
  }
  if (ai !== cur) {
    if (cur >= 0) document.getElementById(scenes[cur].id).classList.remove('active');
    cur = ai;
    clrTimers();
    document.getElementById(scenes[ai].id).classList.add('active');
    if (ai < scenes.length - 1) { doFlash(); animText(ai); }
    else { showLogo(); }
  }
  if (el < TOTAL) { raf = requestAnimationFrame(tick); }
  else {
    document.getElementById('pbar').style.width = '100%';
    document.getElementById('replaybtn').style.display = 'block';
    running = false;
  }
}

function startVideo() {
  if (running) return;
  running = true; t0 = null; cur = -1; clrTimers();
  document.getElementById('pbar').style.width = '0%';
  document.getElementById('replaybtn').style.display = 'none';
  document.getElementById('playbtn').classList.add('gone');
  scenes.forEach(function(s) { document.getElementById(s.id).classList.remove('active'); });
  document.getElementById('s0').classList.add('active');
  cur = 0; animText(0);
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(tick);
}

  var q = new URLSearchParams(location.search);
  if (q.get('background') === '1') {
    document.documentElement.style.height = '100%';
    document.documentElement.style.width = '100%';
    document.documentElement.style.overflow = 'hidden';
    document.body.style.background = 'transparent';
    document.body.style.margin = '0';
    document.body.style.minHeight = '100%';
    document.body.style.height = '100%';
    document.body.style.width = '100%';
    document.body.style.display = 'block';
    document.body.style.overflow = 'hidden';
    var root = document.getElementById('root');
    if (root) {
      root.style.width = '100%';
      root.style.maxWidth = '100%';
      root.style.height = '100%';
      root.style.minHeight = '100%';
      root.style.aspectRatio = 'auto';
      root.style.background = 'transparent';
    }
    var pb = document.getElementById('playbtn');
    if (pb) pb.style.display = 'none';
    var rb = document.getElementById('replaybtn');
    if (rb) rb.style.display = 'none';
    var pbar = document.getElementById('pbar');
    if (pbar) pbar.style.display = 'none';
  }
  if (q.get('autoplay') === '1') {
    var run = function() { setTimeout(startVideo, q.get('background') === '1' ? 200 : 0); };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
    else run();
  }
})();

</script>
</body>
</html>
